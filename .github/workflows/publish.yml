name: Publish horsey-parser

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@laine-hallot"

      - run: npm ci

      - run: npm run build
        working-directory: horsey-parser

      - run: npm publish
        working-directory: horsey-parser
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
