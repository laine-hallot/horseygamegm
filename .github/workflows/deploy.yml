name: Deploy to GitHub Pages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes in genome-mapper
        id: diff
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, proceeding with build"
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git diff --quiet "$PREV_TAG" HEAD -- packages/genome-mapper/; then
            echo "No changes in genome-mapper since $PREV_TAG, skipping"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected in genome-mapper since $PREV_TAG"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        if: steps.diff.outputs.changed == 'true'
        with:
          node-version: 24
          cache: npm

      - run: npm ci
        if: steps.diff.outputs.changed == 'true'

      - run: npm -w horsey-parser run build
        if: steps.diff.outputs.changed == 'true'

      - run: npm run build
        if: steps.diff.outputs.changed == 'true'
        working-directory: packages/genome-mapper

      - uses: actions/upload-pages-artifact@v3
        if: steps.diff.outputs.changed == 'true'
        with:
          path: packages/genome-mapper/dist

  deploy:
    needs: build
    if: needs.build.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
