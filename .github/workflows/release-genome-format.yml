name: Release genome-format

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes in genome-format
        id: diff
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, proceeding with release"
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git diff --quiet "$PREV_TAG" HEAD -- genome-format/; then
            echo "No changes in genome-format since $PREV_TAG, skipping"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected in genome-format since $PREV_TAG"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        if: steps.diff.outputs.changed == 'true'
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@laine-hallot"

      - run: npm ci
        if: steps.diff.outputs.changed == 'true'

      - run: npm run build
        if: steps.diff.outputs.changed == 'true'
        working-directory: genome-format

      - run: node bin/to-schema.js
        if: steps.diff.outputs.changed == 'true'
        working-directory: genome-format

      - name: Upload schema to release
        if: steps.diff.outputs.changed == 'true'
        run: gh release upload "${{ github.ref_name }}" genome-format/dist/horsey-genome.schema.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npm publish
        if: steps.diff.outputs.changed == 'true'
        working-directory: genome-format
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
