<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horsey Genome Mapper</title>
<style>
  :root {
    --bg: #0a0f1a;
    --surface: #0f172a;
    --border: #1e293b;
    --accent: #38bdf8;
    --text: #cbd5e1;
    --muted: #475569;
    --dim: #334155;
    --A: #eab308;
    --T: #ef4444;
    --C: #3b82f6;
    --G: #22c55e;
    --pos: #f97316;
    --green-hi: #86efac;
    --red-lo: #fca5a5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; font-size: 12px; min-height: 100vh; }

  /* NAV */
  #header { background: var(--surface); border-bottom: 2px solid #1e3a5f; padding: 10px 18px; display: flex; align-items: center; gap: 16px; }
  #header h1 { color: var(--accent); font-size: 14px; letter-spacing: .1em; }
  #header .legend { margin-left: auto; display: flex; gap: 14px; font-size: 11px; color: var(--muted); }
  #header .legend span b { font-size: 12px; }
  nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; }
  nav button { padding: 9px 18px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--muted); cursor: pointer; font-family: inherit; font-size: 12px; letter-spacing: .04em; transition: color .15s; }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
  nav button:hover:not(.active) { color: var(--text); }

  /* LAYOUT */
  #app { padding: 14px; max-width: 1200px; margin: 0 auto; }
  .tab { display: none; } .tab.active { display: block; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; margin-bottom: 10px; }
  .two-col { display: grid; grid-template-columns: 260px 1fr; gap: 12px; }
  .info { color: var(--muted); font-size: 11px; line-height: 1.7; }

  /* INPUTS */
  input, select, textarea { background: var(--bg); border: 1px solid #1e3a5f; border-radius: 4px; color: var(--text); font-family: inherit; font-size: 12px; padding: 7px 10px; width: 100%; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; line-height: 1.5; }
  .field { margin-bottom: 8px; }
  .field label { display: block; color: var(--muted); font-size: 11px; margin-bottom: 4px; }
  button.btn { padding: 8px 18px; background: #0f3a5f; border: 1px solid var(--accent); border-radius: 4px; color: var(--accent); cursor: pointer; font-family: inherit; font-size: 12px; }
  button.btn:hover { background: #1a4a6f; }
  button.btn-ghost { background: transparent; border-color: var(--border); color: var(--muted); }

  /* BASE CHIPS */
  .base { display: inline-flex; align-items: center; justify-content: center; border-radius: 3px; font-weight: bold; line-height: 1; flex-shrink: 0; }
  .base-A { background: var(--A); color: #111; }
  .base-T { background: var(--T); color: #111; }
  .base-C { background: var(--C); color: #fff; }
  .base-G { background: var(--G); color: #111; }
  .base-sm { width: 16px; height: 16px; font-size: 10px; }
  .base-md { width: 22px; height: 22px; font-size: 13px; }
  .base-lg { width: 30px; height: 30px; font-size: 17px; }

  /* HELIX MAP TAB */
  .helix-block { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 6px; }
  .helix-label { color: var(--accent); font-weight: bold; font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .helix-label span { color: var(--dim); font-size: 10px; font-weight: normal; }
  .gene-tiles { display: flex; flex-wrap: wrap; gap: 4px; }
  .gene-tile { background: #111827; border: 1px solid #1e293b; border-radius: 4px; padding: 4px 8px; cursor: pointer; transition: border-color .12s; min-width: 80px; }
  .gene-tile:hover { border-color: var(--accent); }
  .gene-tile .pos { color: var(--dim); font-size: 9px; margin-bottom: 1px; }
  .gene-tile .name { font-size: 10px; font-weight: bold; white-space: nowrap; }
  .gene-tile .cat { font-size: 9px; color: var(--muted); }

  /* GENE LIST */
  .gene-list { overflow-y: auto; max-height: 620px; border: 1px solid var(--border); border-radius: 6px; }
  .gene-row { padding: 6px 12px; cursor: pointer; border-bottom: 1px solid #0f172a; display: flex; justify-content: space-between; align-items: center; transition: background .1s; }
  .gene-row:hover { background: #0f1f35; }
  .gene-row.selected { background: #0f2a4a; }
  .gene-row .gname { font-size: 11px; }
  .gene-row .gloc { color: var(--dim); font-size: 10px; }
  .gene-row .gcat { font-size: 9px; margin-left: 6px; }

  /* DETAIL */
  .allele-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 12px 0; }
  .allele-card { background: var(--bg); border-radius: 6px; padding: 10px; text-align: center; border: 1px solid #1e293b; }
  .allele-card .av { font-size: 20px; font-weight: bold; margin-top: 4px; }
  .allele-card .al { color: var(--muted); font-size: 10px; margin-top: 2px; }
  .loc-bar { display: flex; gap: 10px; align-items: center; padding: 8px 12px; background: #0a1628; border-radius: 4px; border: 1px solid #1e3a5f; margin-bottom: 12px; font-size: 11px; }
  .loc-bar .lval { color: #7dd3fc; font-weight: bold; font-size: 13px; }
  .hint-bar { padding: 8px 12px; background: #0a1628; border-radius: 4px; font-size: 11px; color: var(--muted); margin-top: 10px; line-height: 1.7; }

  /* CRISPR */
  .crispr-detail { }
  .crispr-info { padding: 10px 14px; background: #0a1628; border-radius: 4px; border: 1px solid #1e3a5f; margin-bottom: 14px; font-size: 11px; color: #94a3b8; line-height: 1.8; }
  .swap-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
  .swap-card { background: var(--bg); border: 2px solid #1e293b; border-radius: 6px; padding: 10px; text-align: center; }
  .swap-card .sv { font-size: 20px; font-weight: bold; margin-top: 6px; }
  .swap-card .sl { color: var(--muted); font-size: 10px; margin-top: 2px; }
  .swap-card.is-max { background: #0a2a1a; }
  .swap-card.is-min-neg { background: #2a0a0a; }
  .badge { font-size: 9px; margin-top: 4px; }

  /* ANALYZER */
  .result-helix { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 6px; }
  .strand-row { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
  .strand-label { color: var(--dim); font-size: 10px; min-width: 24px; }
  .result-genes { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .result-gene { background: #0a0f1a; border: 1px solid #1e293b; border-radius: 4px; padding: 4px 7px; min-width: 90px; }
  .result-gene .rpos { color: var(--dim); font-size: 9px; }
  .result-gene .rname { font-size: 10px; font-weight: bold; margin: 1px 0 3px; }
  .result-gene .rval { display: flex; align-items: center; gap: 3px; font-size: 10px; }
  .val-pos { color: var(--green-hi); font-weight: bold; }
  .val-neg { color: var(--red-lo); font-weight: bold; }
  .val-zero { color: var(--muted); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }
</style>
</head>

  </div>
</div>

<nav>

  <button onclick="showTab('genes',this)">Gene Lookup</button>
  <button onclick="showTab('crispr',this)">CRISPR Planner</button>
  <button onclick="showTab('analyzer',this)">Genome Analyzer</button>
</nav>

<div id="app">

  <div id="tab-genes" class="tab"></div>
  <div id="tab-crispr" class="tab"></div>
  <div id="tab-analyzer" class="tab"></div>
</div>

// ── HELPERS ──────────────────────────────────────────────────────────────────

function baseChip(b, size='sm') {
  if (!b || !'ATCG'.includes(b)) return '<span style="color:var(--muted)">?</span>';
  return `<span class="base base-${b} base-${size}">${b}</span>`;
}

function valColor(v) {
  if (v === null || v === undefined) return 'var(--muted)';
  return v > 0 ? 'var(--green-hi)' : v < 0 ? 'var(--red-lo)' : 'var(--muted)';
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs||{})) {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string') e.insertAdjacentHTML('beforeend', c);
    else e.appendChild(c);
  }
  return e;
}

// ── TABS ─────────────────────────────────────────────────────────────────────

function showTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
}

// ── TAB: HELIX MAP ────────────────────────────────────────────────────────────

function buildMapTab() {
  const container = document.getElementById('tab-map');
  container.innerHTML = '';

  const info = el('div', {class:'card info'}, 'Each helix position maps to exactly one gene. The base (A/T/C/G) at that position selects the allele value. Both strands are read independently. Click any gene tile to view it in Gene Lookup.');
  container.appendChild(info);

  HELIX_MAP.forEach((genes, h) => {
    const block = el('div', {class:'helix-block'});
    const label = el('div', {class:'helix-label'},
      `HELIX ${h}`,
      el('span', {}, `${genes.length} positions`)
    );
    block.appendChild(label);

    const tiles = el('div', {class:'gene-tiles'});
    genes.forEach((name, pos) => {
      const g = GENES[name];
      const catC = g ? (CAT_COLOR[g.cat]||'#64748b') : '#64748b';
      const tile = el('div', {class:'gene-tile'});
      tile.style.borderColor = catC + '44';
      tile.innerHTML = `<div class="pos">P${pos}</div><div class="name" style="color:${catC}">${name}</div>${g?`<div class="cat">${g.cat}</div>`:''}`;
      tile.addEventListener('mouseenter', () => tile.style.borderColor = catC);
      tile.addEventListener('mouseleave', () => tile.style.borderColor = catC + '44');
      tile.addEventListener('click', () => {
        showTab('genes', document.querySelectorAll('nav button')[1]);
        buildGenesTab(name);
      });
      tiles.appendChild(tile);
    });
    block.appendChild(tiles);
    container.appendChild(block);
  });
}

// ── TAB: GENE LOOKUP ──────────────────────────────────────────────────────────

let geneSearchVal = '', geneCatVal = 'all', selGene = null;

function buildGenesTab(preselect) {
  const container = document.getElementById('tab-genes');
  container.innerHTML = '';
  if (preselect) selGene = preselect;

  const wrap = el('div', {class:'two-col'});

  // LEFT: filter + list
  const left = el('div', {});
  const sField = el('div', {class:'field'});
  const sInput = el('input', {type:'text', placeholder:'Search gene name...', value: geneSearchVal});
  sInput.addEventListener('input', () => { geneSearchVal = sInput.value; renderList(); });
  sField.appendChild(sInput);

  const cField = el('div', {class:'field'});
  const cSel = el('select', {});
  [['all','All categories'], ...ALL_CATS.map(c=>[c,c])].forEach(([v,l])=>{
    const o = el('option', {value:v}, l); if (v===geneCatVal) o.selected=true; cSel.appendChild(o);
  });
  cSel.addEventListener('change', () => { geneCatVal = cSel.value; renderList(); });
  cField.appendChild(cSel);

  left.appendChild(sField);
  left.appendChild(cField);

  const listDiv = el('div', {class:'gene-list'});
  left.appendChild(listDiv);

  // RIGHT: detail
  const right = el('div', {});
  const detail = el('div', {});
  right.appendChild(detail);

  wrap.appendChild(left);
  wrap.appendChild(right);
  container.appendChild(wrap);

  function renderList() {
    listDiv.innerHTML = '';
    const q = geneSearchVal.toLowerCase();
    Object.entries(GENES).forEach(([name, g]) => {
      if (geneCatVal !== 'all' && g.cat !== geneCatVal) return;
      if (q && !name.toLowerCase().includes(q)) return;
      const loc = GENE_LOC[name];
      const catC = CAT_COLOR[g.cat]||'#64748b';
      const row = el('div', {class:'gene-row' + (selGene===name?' selected':'')});
      row.innerHTML = `<div><span class="gname">${name}</span><span class="gcat" style="color:${catC}">${g.cat}</span></div>${loc?`<span class="gloc">H${loc.h}·P${loc.pos}</span>`:''}`;
      row.addEventListener('click', () => { selGene = name; renderList(); renderDetail(); });
      listDiv.appendChild(row);
    });
  }

  function renderDetail() {
    detail.innerHTML = '';
    if (!selGene || !GENES[selGene]) {
      detail.innerHTML = '<div class="card info" style="text-align:center;padding:40px">Select a gene to view details</div>';
      return;
    }
    const g = GENES[selGene];
    const loc = GENE_LOC[selGene];
    const catC = CAT_COLOR[g.cat]||'#64748b';
    const maxVal = Math.max(...g.g);
    const maxBase = BASES[g.g.indexOf(maxVal)];

    const card = el('div', {class:'card'});
    card.innerHTML = `
      <div style="display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;margin-bottom:10px">
        <span style="font-size:17px;font-weight:bold;color:var(--accent)">${selGene}</span>
        <span style="color:${catC};font-size:11px">${g.cat}</span>
        <span style="color:var(--muted);font-size:11px">baseline ${g.m} · scale ${g.s}</span>
      </div>
      ${loc ? `<div class="loc-bar">
        <span style="color:var(--muted);font-size:11px">Location:</span>
        <span class="lval">Helix ${loc.h}</span>
        <span style="color:var(--dim)">·</span>
        <span class="lval" style="font-size:12px">Position ${loc.pos}</span>
        <span style="color:var(--dim)">·</span>
        <span style="color:var(--muted);font-size:10px">same on both strands</span>
      </div>` : '<div class="loc-bar" style="color:var(--muted)">Location unconfirmed (SIZE gene)</div>'}
      <div class="allele-grid">
        ${BASES.map((b,i)=>`
          <div class="allele-card" style="border-color:var(--${b})44">
            ${baseChip(b,'md')}
            <div class="av" style="color:${valColor(g.g[i])}">${g.g[i]}</div>
            <div class="al">${BASE_LABEL[b]} · g${i}</div>
          </div>`).join('')}
      </div>
      <div class="hint-bar">
        To maximize this gene: use <b style="color:var(--${maxBase})">${maxBase} (${BASE_LABEL[maxBase]})</b>
        at Helix ${loc?loc.h:'?'}, Position ${loc?loc.pos:'?'} on both strands.
      </div>
    `;
    detail.appendChild(card);
  }

  renderList();
  renderDetail();
}

// ── TAB: CRISPR PLANNER ───────────────────────────────────────────────────────

function buildCrisprTab() {
  const container = document.getElementById('tab-crispr');
  container.innerHTML = '';

  container.appendChild(el('div', {class:'card info'}, '<strong style="color:var(--accent)">How to use:</strong> Select a gene. The tool shows exactly which helix and position to edit, and what base to place for each allele value. No genome input needed — position is fixed for every horse.'));

  const wrap = el('div', {class:'two-col'});
  const left = el('div', {});
  const right = el('div', {});
  wrap.appendChild(left); wrap.appendChild(right);
  container.appendChild(wrap);

  const field = el('div', {class:'field'});
  const lbl = el('label', {}, 'Select Gene');
  const sel = el('select', {});
  sel.appendChild(el('option', {value:''}, '-- choose a gene --'));
  ALL_CATS.forEach(cat => {
    const grp = el('optgroup', {label:cat});
    Object.entries(GENES).filter(([,g])=>g.cat===cat).forEach(([name])=>{
      const loc = GENE_LOC[name];
      grp.appendChild(el('option', {value:name}, `${name}${loc?` [H${loc.h}·P${loc.pos}]`:''}`));
    });
    sel.appendChild(grp);
  });
  field.appendChild(lbl); field.appendChild(sel);
  left.appendChild(field);

  const infoBox = el('div', {class:'card', style:'background:#0a1628;border-color:#1e3a5f;display:none'});
  left.appendChild(infoBox);

  const detail = el('div', {});
  right.appendChild(detail);

  sel.addEventListener('change', () => {
    const name = sel.value;
    const g = GENES[name];
    const loc = GENE_LOC[name];
    if (!g) { infoBox.style.display='none'; detail.innerHTML=''; return; }
    const catC = CAT_COLOR[g.cat]||'#64748b';
    infoBox.style.display = 'block';
    infoBox.innerHTML = `
      <div style="color:var(--accent);font-weight:bold;font-size:13px;margin-bottom:8px">${name}</div>
      <div style="color:var(--muted);font-size:11px;line-height:1.9">
        Category: <span style="color:${catC}">${g.cat}</span><br>
        Helix: <b style="color:#7dd3fc">${loc?loc.h:'?'}</b><br>
        Position: <b style="color:#7dd3fc">${loc?loc.pos:'?'}</b><br>
        Baseline: ${g.m} · Scale: ${g.s}
      </div>`;

    const maxVal = Math.max(...g.g), minVal = Math.min(...g.g);
    detail.innerHTML = '';
    const card = el('div', {class:'card'});
    card.innerHTML = `
      <div style="color:#7dd3fc;font-weight:bold;margin-bottom:12px;font-size:13px;letter-spacing:.05em">EDIT GUIDE — ${name}</div>
      <div class="crispr-info">
        In-game: go to <b style="color:var(--accent)">Helix ${loc?loc.h:'?'}</b>, count to
        <b style="color:var(--accent)">position ${loc?loc.pos:'?'}</b> from the top (position 0 = top).
        The base there controls this gene. Same position on both strands.
      </div>
      <div class="swap-grid">
        ${BASES.map((b,i)=>{
          const v = g.g[i];
          const isMax = v===maxVal, isMinNeg = v===minVal&&v<0;
          return `<div class="swap-card${isMax?' is-max':''}${isMinNeg?' is-min-neg':''}">
            ${baseChip(b,'lg')}
            <div class="sl">${BASE_LABEL[b]}</div>
            <div class="sl" style="color:var(--muted)">g${i}</div>
            <div class="sv" style="color:${valColor(v)}">${v}</div>
            ${isMax?'<div class="badge" style="color:var(--green-hi)">MAX</div>':''}
            ${isMinNeg?'<div class="badge" style="color:var(--red-lo)">MIN</div>':''}
          </div>`;
        }).join('')}
      </div>
      <div class="hint-bar">
        Quick ref at H${loc?loc.h:'?'} P${loc?loc.pos:'?'}:
        ${BASES.map((b,i)=>`${baseChip(b,'sm')} = <span style="color:${valColor(g.g[i])};font-weight:bold">${g.g[i]}</span>`).join(' &nbsp; ')}
      </div>`;
    detail.appendChild(card);
  });
}

// ── TAB: GENOME ANALYZER ─────────────────────────────────────────────────────

function parseGenome(text) {
  const helices = Array.from({length:20}, ()=>['','']);
  const lines = text.trim().split('\n').map(l=>l.trim()).filter(Boolean);
  let cur = -1;
  for (const line of lines) {
    // new game format: "00:ACCTCAGGTT" (index:number followed by sequence)
    const nm = line.match(/^(\d{1,2})\s*:\s*([atcg]+)$/i);
    if (nm) {
      const idx = parseInt(nm[1], 10);
      if (idx >= 0 && idx < 20) {
        const seq = nm[2].toUpperCase();
        // fill first empty strand, then second
        if (!helices[idx][0]) helices[idx][0] = seq;
        else if (!helices[idx][1]) helices[idx][1] = seq;
        else helices[idx][1] = seq; // overwrite second if both exist
      }
      continue;
    }

    const hm = line.match(/helix\s*(\d+)[^:)]*[:\)]\s*([atcg]+)/i);
    const sm = line.match(/(?:second\s*strand|strand\s*2)[^:]*:\s*([atcg]+)/i);
    if (hm) { cur = parseInt(hm[1]); if (cur < 20) helices[cur][0] = hm[2].toUpperCase(); }
    else if (sm && cur >= 0 && cur < 20) helices[cur][1] = sm[1].toUpperCase();
    else if (cur >= 0 && cur < 20 && !helices[cur][1] && /^[atcg]+$/i.test(line)) helices[cur][1] = line.toUpperCase();
  }
  return helices;
}

function buildAnalyzerTab() {
  const container = document.getElementById('tab-analyzer');
  container.innerHTML = '';

  const card = el('div', {class:'card'});
  const field = el('div', {class:'field'});
  field.innerHTML = '<label>Paste genome (20 helices, both strands)</label>';
  const ta = el('textarea', {rows:'8', placeholder:'Helix 0.) atcgatcg\nSecond Strand: gctagcta\n\n(or numbered format e.g. 00:ACCTCAGGTT on each line, two lines per helix)'});
  field.appendChild(ta);
  card.appendChild(field);

  const btnRow = el('div', {style:'display:flex;gap:8px;margin-top:8px'});
  const run = el('button', {class:'btn'}, 'Analyze Genome');
  const clr = el('button', {class:'btn btn-ghost'}, 'Clear');
  btnRow.appendChild(run); btnRow.appendChild(clr);
  card.appendChild(btnRow);
  container.appendChild(card);

  const results = el('div', {});
  container.appendChild(results);

  run.addEventListener('click', () => {
    const genome = parseGenome(ta.value);
    results.innerHTML = '';
    HELIX_MAP.forEach((genes, h) => {
      const s1 = genome[h][0], s2 = genome[h][1];
      const has = s1 || s2;
      const block = el('div', {class:'result-helix'});
      const hdr = el('div', {style:'display:flex;gap:10px;align-items:center;margin-bottom:'+(has?'8px':'0')});
      hdr.innerHTML = `<span style="color:var(--accent);font-weight:bold;font-size:13px;min-width:65px">HELIX ${h}</span>`;
      if (s1) {
        const r = el('div', {class:'strand-row'});
        r.innerHTML = `<span class="strand-label">S1</span>` + s1.split('').map(b=>baseChip(b,'sm')).join('');
        hdr.appendChild(r);
      }
      if (s2 && s2 !== s1) {
        const r = el('div', {class:'strand-row'});
        r.innerHTML = `<span class="strand-label">S2</span>` + s2.split('').map(b=>baseChip(b,'sm')).join('');
        hdr.appendChild(r);
      } else if (s2 && s2 === s1) {
        hdr.appendChild(el('span', {style:'color:var(--dim);font-size:10px'}, 'S2 = S1'));
      }
      if (!has) hdr.appendChild(el('span', {style:'color:var(--dim);font-size:11px'}, 'no data'));
      block.appendChild(hdr);

      if (has) {
        const gDiv = el('div', {class:'result-genes'});
        genes.forEach((name, pos) => {
          const g = GENES[name];
          const b1 = s1?.[pos]?.toUpperCase();
          const b2 = s2?.[pos]?.toUpperCase();
          const v1 = b1 && g ? g.g[BASE_IDX[b1]] : null;
          const v2 = b2 && g ? g.g[BASE_IDX[b2]] : null;
          const catC = g ? (CAT_COLOR[g.cat]||'#64748b') : '#475569';
          const rg = el('div', {class:'result-gene', style:`border-color:${catC}33`});
          rg.innerHTML = `
            <div class="rpos">P${pos}</div>
            <div class="rname" style="color:${catC}">${name}</div>
            <div class="rval">
              ${b1 ? `${baseChip(b1,'sm')}<span style="color:var(--muted)">=</span><span style="color:${valColor(v1)};font-weight:bold">${v1}</span>` : '<span style="color:var(--dim)">—</span>'}
              ${b2 && b2!==b1 ? `<span style="color:var(--dim);font-size:9px;margin-left:3px">S2:</span>${baseChip(b2,'sm')}<span style="color:var(--muted)">=</span><span style="color:${valColor(v2)};font-weight:bold">${v2}</span>` : ''}
            </div>`;
          gDiv.appendChild(rg);
        });
        block.appendChild(gDiv);
      }
      results.appendChild(block);
    });
  });

  clr.addEventListener('click', () => { ta.value = ''; results.innerHTML = ''; });
}

// ── INIT ──────────────────────────────────────────────────────────────────────

buildMapTab();
buildGenesTab();
buildCrisprTab();
buildAnalyzerTab();
</script>
